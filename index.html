<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Registration Form</title>
  <style>
    /* Body styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Form container */
    .form-container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 400px;
    }

    /* Heading */
    h2 {
      text-align: center;
      color: #ff6f61;
      margin-bottom: 20px;
      font-family: 'Verdana', sans-serif;
    }

    /* Labels */
    label {
      display: block;
      margin: 10px 0 5px;
      color: #555;
      font-weight: bold;
    }

    /* Inputs and select */
    input[type="text"],
    input[type="email"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #ff6f61;
      outline: none;
    }

    /* Checkbox group */
    .checkbox-group {
      margin-bottom: 20px;
    }

    .checkbox-group label {
      display: inline-block;
      margin-right: 15px;
      font-weight: normal;
      color: #333;
    }

    /* Submit button */
    button {
      width: 100%;
      padding: 12px;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff3b2e;
    }

  </style>
</head>
<body>
  <div class="form-container">
    <h2>Course Registration</h2>
    <form>
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" placeholder="Enter your age" required>

      <label for="gender">Gender:</label>
      <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <label>Choose Courses:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="course" value="Web Development"> Web Development</label>
        <label><input type="checkbox" name="course" value="Data Science"> Data Science</label>
        <label><input type="checkbox" name="course" value="UI/UX Design"> UI/UX Design</label>
        <label><input type="checkbox" name="course" value="Python Programming"> Python Programming</label>
      </div>

      <button type="submit">Register</button>
    </form>
  </div>
</body>
</html>
